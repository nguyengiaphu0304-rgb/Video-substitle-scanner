<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Subtitle Scanner</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header class="hero">
        <div class="mark" aria-hidden="true">VS</div>
        <div>
          <span>Video Subtitle Scanner</span>
          <h1>Extract captions</h1>
        </div>
      </header>

      <section class="panel">
        <button id="extract" class="primary" type="button">Extract From Active Tab</button>
        <p id="status" role="status" aria-live="polite" aria-atomic="true">Open a video tab, turn on captions, then extract.</p>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Advanced Scan</h2>
          <span>Optional</span>
        </div>
        <div class="actions three">
          <button id="start-scan" type="button">Start Scan</button>
          <button id="refresh-scan" type="button">Refresh</button>
          <button id="stop-scan" type="button">Stop</button>
        </div>
        <p class="hint">Uses Chrome debugger access only after you start it.</p>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2 id="output-heading">SRT Output</h2>
          <span id="output-count">Ready</span>
        </div>
        <textarea id="output" aria-labelledby="output-heading output-count" spellcheck="false" placeholder="Extracted SRT or caption URLs will appear here."></textarea>

        <div class="actions">
          <button id="copy" type="button">Copy SRT</button>
          <button id="download" type="button">Download SRT</button>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2 id="notes-heading">Auto Notes</h2>
          <span id="notes-format">Markdown</span>
        </div>
        <textarea id="notes" aria-labelledby="notes-heading notes-format" spellcheck="false" placeholder="Notes will appear here after extraction."></textarea>
        <div class="actions">
          <button id="copy-notes" type="button">Copy Notes</button>
          <button id="download-notes" type="button">Download Notes</button>
        </div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>

name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run verify:extension
      - run: npm run build
      - run: npm run audit
      - run: npm run pack:extension
      - run: npm run verify:package
      - uses: actions/upload-artifact@v6
        with:
          name: video-subtitle-scanner-extension
          path: |
            dist/*.zip
            dist/*.sha256
            dist/*.manifest.json
          if-no-files-found: error
